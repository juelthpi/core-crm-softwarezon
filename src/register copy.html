<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trade Analysis dashboard - Professional Analysis & Subscription Platform" />
  <meta name="keywords" content="trading, dashboard, analysis, fintech, cryptocurency, stocks" />
  <meta name="author" content="Softwarezon" />
  <title>Forex - Signal</title>
  <style>
    :root {
      --brand-main: #008658;
    }
  </style>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
    rel="stylesheet">
  <!-- Custom Icons & Styling -->
  <link href="https://dev.iconly.io/public/wFdRuZcL7WlO/iconly.css" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body class="font-body">

  <div class="grid grid-cols-1 lg:grid-cols-2 min-h-screen">
    <div
      class="bg-dark-green relative z-10 py-10 lg:py-16 px-4 hidden lg:flex lg:flex-col lg:justify-center lg:items-end">
      <div class="absolute inset-0 bg-linear-gradient -z-10 bg-no-repeat bg-cover"></div>

      <div class="flex justify-end">
        <div class="w-full max-w-[750px]">
          <div class="space-y-10 lg:pe-12">
            <img src="assets/images/logo.png" alt="Logo" class="max-h-8 w-auto logo-dark">
            <img src="assets/images/thumbnails/login-thumbnails.png" alt="Login Thumbnails"
              class="w-full max-w-[367px] mx-auto block">
            <div class="space-y-2">
              <h2 class="text-lg lg:text-3xl font-bold text-white leading-tight">Invest smarter, not harder, trade with
                confidence.
              </h2>
              <p class="text-white/50 text-sm lg:text-base leading-relaxed">Lorem ipsum dolor sit amet consectetur.
                Egestas ac posuere
                cras. Lacus neque neque purus semper</p>
            </div>
          </div>
        </div>
      </div>
    </div>
    <div class="bg-black py-10 lg:py-16 flex justify-center lg:justify-start items-center px-4 md:px-10 relative">
      <div class="absolute h-full w-full inset-e-0 top-0 bg-linear-gradient-2 bg-no-repeat bg-cover"></div>
      <div
        class="w-full max-w-[750px] dark:bg-dark-green border border-black/10 dark:border-white/5 rounded-xl p-3 md:p-6 relative z-10">
        <div class="space-y-5 ">
          <div>
            <h2 class="text-lg lg:text-2xl font-bold text-white leading-tight">Create an Account.
            </h2>
            <p class="text-white/50 text-sm lg:text-base leading-relaxed">Enter Your Account Details</p>
          </div>
          <form>
            <div class="row">
              <div class="form-group md:col-span-6">
                <label class="form-label">First Name</label>
                <input type="text" class="form-control" placeholder="Kadir">
              </div>
              <div class="form-group md:col-span-6">
                <label class="form-label">Last Name</label>
                <input type="text" class="form-control" placeholder="Miye">
              </div>


            </div>
            <div class="row">
              <div class="form-group md:col-span-12">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control" placeholder="jhondoe@gmail.com">
              </div>
            </div>
            <div class="row">
              <div class="form-group md:col-span-12">
                <label class="form-label">Phone Number</label>
                <input type="text" class="form-control" placeholder="+ XX XXX XXXX XXXX">
              </div>
            </div>
            <div class="row">
              <div class="form-group md:col-span-12">
                <label class="form-label">Password</label>
                <div class="relative">
                  <input type="password" class="form-control pe-10" value="test">
                  <button type="button"
                    class="toggle-password absolute inset-y-0 end-0 flex items-center justify-center w-10 text-black/50 dark:text-white/50 hover:text-black dark:hover:text-white cursor-pointer">
                    <i class="sz-eye text-lg"></i>
                  </button>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="form-group md:col-span-12">
                <label class="form-label">Confirm password</label>
                <div class="relative">
                  <input type="password" class="form-control pe-10" value="test">
                  <button type="button"
                    class="toggle-password absolute inset-y-0 end-0 flex items-center justify-center w-10 text-black/50 dark:text-white/50 hover:text-black dark:hover:text-white cursor-pointer">
                    <i class="sz-eye text-lg"></i>
                  </button>
                </div>
              </div>
            </div>
            <div class="row">
              <div class="form-group md:col-span-12 flex items-center gap-2 mt-2">
                <input type="checkbox" id="terms" class="checkbox">
                <label for="terms" class="checkbox-text">I agree
                  to
                  Terms & Conditions</label>
              </div>
            </div>
            <div class="row">
              <div class="form-group md:col-span-12 mt-6">
                <button type="submit" class="w-full primary-btn">
                  Create Account
                </button>
              </div>
            </div>
            <div class="row">
              <div class="form-group md:col-span-12 mt-6 text-center">
                <p class="text-black/50 dark:text-white/80 text-sm">Already have an account? <a href="login.html"
                    class="text-brand font-medium hover:text-brand/80 transition-colors">Login</a></p>
              </div>
            </div>


          </form>
        </div>
      </div>
    </div>
  </div>
</body>
<!-- password show hide -->
<script>
  document.addEventListener('DOMContentLoaded', () => {
    document.querySelectorAll('.toggle-password').forEach(button => {
      button.addEventListener('click', function () {
        const input = this.closest('.relative').querySelector('input');
        const icon = this.querySelector('i');

        if (input.type === 'password') {
          input.type = 'text';
          icon.classList.remove('sz-eye');
          icon.classList.add('sz-eye-slash');
        } else {
          input.type = 'password';
          icon.classList.remove('sz-eye-slash');
          icon.classList.add('sz-eye');
        }
      });
    });
  });
</script>

</html>
