<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Trade Analysis dashboard - Professional Analysis & Subscription Platform" />
  <meta name="keywords" content="trading, dashboard, analysis, fintech, cryptocurency, stocks" />
  <meta name="author" content="Softwarezon" />
  <title>Forex - Signal</title>
  <style>
    :root {
      --brand-main: #008658;
    }
  </style>
  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="assets/images/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
    rel="stylesheet">
  <!-- Custom Icons & Styling -->
  <link href="https://dev.iconly.io/public/wFdRuZcL7WlO/iconly.css" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/style.css" />
</head>

<body class="bg-body-light dark:bg-body text-main font-body transition-colors duration-300">

  <div class="h-screen overflow-hidden flex flex-col relative w-full">

    <div class="fixed inset-0 z-0 pointer-events-none">

      <div
        class="absolute top-[50%] left-[30%] -translate-x-1/2 -translate-y-1/2 w-[600px] h-[600px] bg-brand/20 blur-[150px] rounded-full">
      </div>

      <div class="absolute -top-40 -left-40 w-[600px] h-[600px] bg-brand/10 blur-[150px] rounded-full"></div>

      <div
        class="absolute -top-20 -right-20 w-full h-full max-w-[400px] max-h-[400px] bg-brand/80 blur-[180px] rounded-full transition-opacity md:opacity-100 opacity-35">
      </div>

      <div
        class="absolute -bottom-40 -right-40 w-[600px] h-[600px] bg-brand/5 blur-[150px] rounded-full md:opacity-100 opacity-35">
      </div>
    </div>


    <div class="absolute top-0 left-0 w-full lg:w-1/2 h-full z-0 pointer-events-none transition-all duration-500">
      <div class="relative w-full h-full">
        <img src="assets/images/thumbnails/error-shape-2.svg" alt="404 Illustration"
          class="absolute top-0 left-0 w-full h-full object-contain object-bottom-left lg:object-top-left scale-110 lg:scale-100 opacity-40 lg:opacity-100 drop-shadow-[0_45px_65px_rgba(0,0,0,0.6)]">
      </div>
    </div>


    <header
      class="w-full max-w-[1400px] mx-auto py-6 lg:py-8 px-6 md:px-12 flex items-center justify-between z-10 relative shrink-0">
      <a href="index.html" class="flex items-center">
        <img src="assets/images/logo.png" alt="Prop Funding" class="h-7 md:h-9 w-auto logo-dark">
        <img src="assets/images/logo-black.png" alt="Prop Funding" class="h-7 md:h-9 w-auto logo-light">
      </a>
      <a href="#"
        class="text-xs md:text-base font-semibold dark:text-white/90 text-black/90 hover:text-brand transition-colors">
        Contact Support
      </a>
    </header>


    <main class="flex-1 flex items-center relative z-10 overflow-hidden w-full h-full pb-12 lg:pb-0">
      <div class="w-full grid grid-cols-1 lg:grid-cols-2 gap-10 lg:gap-0 items-center h-full">


        <div class="hidden lg:block h-full w-full pointer-events-none"></div>


        <div class="flex justify-center lg:justify-start px-6 md:px-12 py-10 lg:py-0">
          <div class="max-w-[600px] space-y-6 lg:space-y-8 text-center lg:text-left">

            <div
              class="inline-flex items-center gap-2.5 px-4 py-2 rounded-full border border-black/5 dark:border-white/5 bg-black/10 dark:bg-white/10 backdrop-blur-md">
              <span class="w-2 h-2 rounded-full bg-brand"></span>
              <span
                class="text-[10px] md:text-xs font-bold dark:text-white/90 text-black/90 uppercase tracking-widest">Error
                503</span>
            </div>

            <div class="space-y-3 lg:space-y-4">
              <h1
                class="text-xl md:text-3xl lg:text-4xl font-bold dark:text-white text-black tracking-tight leading-[1.1]">
                Service Temporarily Unavailable
              </h1>
              <p
                class="text-base dark:text-white/70 text-black/70 max-w-[480px] mx-auto lg:mx-0 leading-relaxed font-normal">
                We’re currently experiencing some issues or performing maintenance. Our team is working to restore
                service as soon as possible.
              </p>
            </div>

            <div class="pt-2">

              <div class="flex gap-2 flex-wrap">
                <a href="index.html" class="secondary-btn"> <i class="sz-refresh text-xl"></i> Try Again </a>
                <a href="index.html" class="primary-btn inline-flex ">
                  <i class="sz-dashboard text-xl"></i>
                  Back to Dashboard
                </a>

              </div>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>
</body>
<script src="assets/js/layout.js"></script>

</html>
