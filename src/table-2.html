  <style>
    /* Table Responsive Core */
    .custom-responsive-table.table-card-mode thead {
      display: none;
    }

    .custom-responsive-table.table-card-mode,
    .custom-responsive-table.table-card-mode tbody,
    .custom-responsive-table.table-card-mode tr,
    .custom-responsive-table.table-card-mode td {
      display: block;
      width: 100%;
    }

    .custom-responsive-table.table-card-mode tr {
      margin-bottom: 1.5rem;
      padding: 1.25rem 1rem;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 1.25rem;
    }

    .custom-responsive-table.table-card-mode td {
      display: grid;
      grid-template-columns: 140px 1fr !important;
      align-items: center;
      gap: 1rem;
      padding: 0.85rem 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      text-align: start;
    }

    .custom-responsive-table.table-card-mode td:last-child {
      border-bottom: 0;
    }

    .custom-responsive-table.table-card-mode td::before {
      content: attr(data-label);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.7rem;
      color: rgba(255, 255, 255, 0.4);
      text-align: start;
    }

    .custom-responsive-table.table-card-mode td>* {
      margin-inline-start: auto;
      display: flex;
      justify-content: flex-end;
    }

    .custom-responsive-table:not(.table-card-mode) th,
    .custom-responsive-table:not(.table-card-mode) td {
      white-space: nowrap;
    }

    .responsive-table-wrapper {
      position: relative;
      width: 100%;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/simplebar@latest/dist/simplebar.min.js"></script>
  <script src="assets/js/layout.js"></script>

  <script>
    /**
     * Auto-Labeling and Adaptive Resize Controller
     */
    function initSmartTables() {
      const tables = document.querySelectorAll('.custom-responsive-table');

      tables.forEach(table => {
        // Step 1: Extract Headers Text (handling icons/tags if any)
        const headerCells = table.querySelectorAll('thead th');
        const labels = Array.from(headerCells).map(th => th.innerText.trim());

        // Step 2: Inject Labels into Rows
        const rows = table.querySelectorAll('tbody tr');
        rows.forEach(row => {
          const cells = row.querySelectorAll('td');
          cells.forEach((cell, i) => {
            if (labels[i]) {
              cell.setAttribute('data-label', labels[i]);
            }
          });
        });

        // Step 3: Resize Logic
        const wrapper = table.parentElement;
        const breakPoint = labels.length * 140;

        const observer = new ResizeObserver(entries => {
          for (let entry of entries) {
            if (entry.contentRect.width < breakPoint) {
              table.classList.add('table-card-mode');
            } else {
              table.classList.remove('table-card-mode');
            }
          }
        });
        observer.observe(wrapper);
      });
    }

    document.addEventListener('DOMContentLoaded', initSmartTables);
    // Re-run after a small delay in case of dynamic content
    window.onload = initSmartTables; 
  </script>
